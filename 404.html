<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sayfa Bulunamadı — Ata Yumurta</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brown:       #8B5C1A;
      --brown-dark:  #5C3A0F;
      --brown-deep:  #3A2208;
      --brown-light: #C8894A;
      --cream:       #F7F3EA;
      --cream-dark:  #EDE5D0;
      --warm-white:  #FDFAF4;
      --text-mid:    #6B4A1E;
    }
    html, body {
      height: 100%;
      font-family: 'Lora', Georgia, serif;
      background: var(--cream);
      color: var(--brown-dark);
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 2rem;
      position: relative;
      overflow: hidden;
    }
    /* Egg decorations */
    .egg { position: absolute; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; pointer-events: none; }
    .egg-a { width: 280px; height: 350px; background: var(--brown); opacity: .05; top: -100px; right: 5%; transform: rotate(18deg); }
    .egg-b { width: 180px; height: 225px; background: var(--brown-light); opacity: .06; bottom: -60px; left: 3%; transform: rotate(-12deg); }

    .egg-404 {
      width: 120px; height: 150px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: linear-gradient(140deg, #F6EDDA, #E8D5A8);
      border: 2px solid rgba(0,0,0,.07);
      box-shadow: inset 0 -6px 12px rgba(0,0,0,.06), 4px 8px 20px rgba(139,92,26,.18);
      margin: 0 auto 2rem;
      position: relative;
      animation: wobble 3s ease-in-out infinite;
    }
    .egg-404::after {
      content: '?';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem; font-weight: 900; font-style: italic;
      color: rgba(92,58,15,.25);
    }
    @keyframes wobble {
      0%, 100% { transform: rotate(-3deg); }
      50%       { transform: rotate(3deg); }
    }

    .code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 900;
      color: var(--brown-dark);
      line-height: 1;
      letter-spacing: -.03em;
      margin-bottom: .25rem;
      opacity: .12;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      white-space: nowrap;
    }

    .content { position: relative; z-index: 2; max-width: 480px; }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 900;
      color: var(--brown-dark);
      margin-bottom: .6rem;
      line-height: 1.2;
    }
    h1 em { color: var(--brown-light); font-style: italic; }

    p {
      font-size: .95rem;
      color: var(--text-mid);
      line-height: 1.75;
      margin-bottom: 2.2rem;
    }

    .actions { display: flex; flex-wrap: wrap; gap: .75rem; justify-content: center; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Lora', serif; font-size: .92rem; font-weight: 500;
      padding: 13px 26px; border-radius: 100px;
      text-decoration: none;
      transition: all .28s cubic-bezier(.4,0,.2,1);
    }
    .btn-primary {
      background: var(--brown); color: var(--warm-white);
      box-shadow: 0 4px 20px rgba(92,58,15,.15);
    }
    .btn-primary:hover { background: var(--brown-deep); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(92,58,15,.22); }
    .btn-ghost {
      background: transparent; color: var(--brown-dark);
      border: 1.5px solid var(--cream-dark);
    }
    .btn-ghost:hover { background: var(--cream-dark); transform: translateY(-2px); }

    .logo-link {
      position: absolute; top: 1.5rem; left: 50%; transform: translateX(-50%);
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem; font-weight: 700;
      color: var(--brown-dark); text-decoration: none;
      display: flex; gap: .3em;
    }
    .logo-link span { color: var(--brown-light); }
  </style>
</head>
<body>
  <div class="page">
    <div class="egg egg-a"></div>
    <div class="egg egg-b"></div>
    <span class="code">404</span>

    <a href="/" class="logo-link">Ata <span>Yumurta</span></a>

    <div class="content">
      <div class="egg-404"></div>
      <h1>Sayfa <em>bulunamadı</em></h1>
      <p>Aradığınız sayfa mevcut değil veya taşınmış olabilir.<br>Ana sayfaya dönerek devam edebilirsiniz.</p>
      <div class="actions">
        <a href="/" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Ana Sayfaya Dön
        </a>
        <a href="tel:05077403262" class="btn btn-ghost">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.12 12 19.79 19.79 0 0 1 1.05 3.4 2 2 0 0 1 3 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 16l.92.92z"/></svg>
          Bizi Arayın
        </a>
      </div>
    </div>
  </div>
</body>
</html>
