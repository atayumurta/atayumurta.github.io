<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Front Export</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brown:       #8B5C1A;
      --brown-dark:  #5C3A0F;
      --brown-deep:  #3A2208;
      --brown-light: #C8894A;
      --brown-pale:  #D4A96A;
      --cream:       #F7F3EA;
      --cream-dark:  #EDE5D0;
      --warm-white:  #FDFAF4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 85mm;
      height: 55mm;
      overflow: hidden;
      background: #F7F3EA;
      font-family: 'Lora', serif;
    }

    .card {
      width: 85mm;
      height: 55mm;
      position: relative;
      overflow: hidden;
    }

    .front {
      background: var(--cream);
      display: flex;
      flex-direction: column;
    }

    .front-egg-1 {
      position: absolute;
      width: 42mm; height: 52mm;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: var(--brown-light);
      opacity: .07;
      top: -14mm; right: -8mm;
      transform: rotate(18deg);
    }
    .front-egg-2 {
      position: absolute;
      width: 22mm; height: 28mm;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: var(--brown-dark);
      opacity: .05;
      bottom: -8mm; left: -4mm;
      transform: rotate(-12deg);
    }

    .front-body {
      display: flex;
      align-items: center;
      flex: 1;
      padding: 5.5mm 6mm 4mm 6mm;
      gap: 5mm;
      position: relative;
      z-index: 2;
    }

    .logo-wrap {
      width: 18mm; height: 18mm;
      flex-shrink: 0;
      border-radius: 50%;
      border: .55mm solid var(--brown-light);
      overflow: hidden;
      box-shadow:
        0 0 0 1.2mm rgba(200,137,74,.12),
        0 1.5mm 5mm rgba(92,58,15,.18);
    }
    .logo-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .front-divider {
      width: .25mm;
      align-self: stretch;
      background: var(--cream-dark);
      flex-shrink: 0;
      margin: 1mm 0;
    }

    .front-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.8mm;
    }
    .front-eyebrow {
      font-size: 5.5pt;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--brown-light);
      font-family: 'Lora', serif;
    }
    .front-brand {
      font-family: 'Playfair Display', serif;
      line-height: 1.05;
    }
    .front-brand-line1 {
      display: block;
      font-size: 15pt;
      font-weight: 900;
      color: var(--brown-dark);
      letter-spacing: -.01em;
    }
    .front-brand-line2 {
      display: block;
      font-size: 17pt;
      font-weight: 900;
      font-style: italic;
      color: var(--brown-light);
      letter-spacing: -.02em;
    }
    .front-tagline-divider {
      width: 10mm; height: .2mm;
      background: var(--cream-dark);
    }
    .front-tagline {
      font-size: 6pt;
      font-style: italic;
      color: var(--brown);
      line-height: 1.55;
      font-family: 'Lora', serif;
    }

    .front-footer {
      background: var(--brown-deep);
      padding: 2mm 6mm;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }
    .front-footer-brand {
      font-size: 5pt;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(212,169,106,.7);
      font-family: 'Lora', serif;
    }
    .front-footer-location {
      font-size: 5pt;
      color: rgba(212,169,106,.45);
      font-family: 'Lora', serif;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="card front">
    <div class="front-egg-1"></div>
    <div class="front-egg-2"></div>

    <div class="front-body">
      <div class="logo-wrap">
        <img src="../logo.jpg" alt="Ata Yumurta">
      </div>
      <div class="front-divider"></div>
      <div class="front-text">
        <span class="front-eyebrow">Burdur'dan Sofraya</span>
        <div class="front-brand">
          <span class="front-brand-line1">Burdur</span>
          <span class="front-brand-line2">Ata Yumurta</span>
        </div>
        <div class="front-tagline-divider"></div>
        <p class="front-tagline">Çiftlikten sofraya,<br>her gün taze yumurta</p>
      </div>
    </div>

    <div class="front-footer">
      <span class="front-footer-brand">Ata Yumurta Çiftliği</span>
      <span class="front-footer-location">Kışla Mah., Burdur</span>
    </div>
  </div>
</body>
</html>
