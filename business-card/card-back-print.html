<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Back Print</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    /* All values in px at 300 dpi (1mm = 11.811px, 1pt = 4.167px) */
    :root {
      --brown-light: #C8894A;
      --brown-pale:  #D4A96A;
      --brown-deep:  #3A2208;
      --warm-white:  #FDFAF4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1004px;
      height: 650px;
      overflow: hidden;
      background: #3A2208;
      font-family: 'Lora', serif;
    }

    .card {
      width: 1004px;
      height: 650px;
      background: var(--brown-deep);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 59px 71px;
      gap: 47px;
      position: relative;
      overflow: hidden;
    }

    /* Egg decorations */
    .egg-1 {
      position: absolute;
      width: 591px; height: 733px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: var(--brown-light);
      opacity: .06;
      top: -213px; right: -142px;
      transform: rotate(15deg);
    }
    .egg-2 {
      position: absolute;
      width: 331px; height: 414px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: var(--brown-pale);
      opacity: .05;
      bottom: -118px; left: -71px;
      transform: rotate(-8deg);
    }

    /* QR column */
    .qr-wrap {
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 21px;
    }
    .qr-frame {
      background: var(--warm-white);
      padding: 26px;
      border-radius: 14px;
      line-height: 0;
      box-shadow: 0 24px 95px rgba(0,0,0,.3);
    }
    #qrcode canvas,
    #qrcode img {
      display: block;
      width: 236px !important;
      height: 236px !important;
    }
    .qr-label {
      font-size: 19px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(212,169,106,.5);
      font-family: 'Lora', serif;
    }

    /* Divider */
    .divider {
      width: 3px;
      align-self: stretch;
      background: rgba(255,255,255,.08);
      flex-shrink: 0;
      margin: 12px 0;
    }

    /* Contact column */
    .contact {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
      position: relative;
      z-index: 2;
    }
    .headline {
      font-family: 'Lora', serif;
      font-size: 27px;
      font-style: italic;
      color: var(--brown-pale);
      line-height: 1.5;
    }
    .phone-row {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .phone-icon {
      width: 41px; height: 41px;
      opacity: .6;
      flex-shrink: 0;
    }
    .phone {
      font-family: 'Playfair Display', serif;
      font-size: 58px;
      font-weight: 900;
      color: var(--warm-white);
      letter-spacing: .02em;
      line-height: 1;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .link-row {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .link-icon {
      width: 35px; height: 35px;
      opacity: .5;
      flex-shrink: 0;
    }
    .link-text {
      font-family: 'Lora', serif;
      font-size: 25px;
      color: rgba(212,169,106,.7);
      letter-spacing: .04em;
    }
    .link-text.wa {
      color: rgba(37,211,102,.7);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="egg-1"></div>
    <div class="egg-2"></div>

    <div class="qr-wrap">
      <div class="qr-frame">
        <div id="qrcode"></div>
      </div>
      <span class="qr-label">atayumurta.tr</span>
    </div>

    <div class="divider"></div>

    <div class="contact">
      <p class="headline">Arayın, taze yumurtayı<br>kapınıza getirelim!</p>

      <div class="phone-row">
        <svg class="phone-icon" viewBox="0 0 24 24" fill="none" stroke="#D4A96A" stroke-width="2.5">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.12 12 19.79 19.79 0 0 1 1.05 3.4 2 2 0 0 1 3 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 16l.92.92z"/>
        </svg>
        <span class="phone">0507 740 3262</span>
      </div>

      <div class="links">
        <div class="link-row">
          <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="#D4A96A" stroke-width="2.2">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span class="link-text">atayumurta.tr</span>
        </div>
        <div class="link-row">
          <svg class="link-icon" viewBox="0 0 24 24" fill="#25D366">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
          </svg>
          <span class="link-text wa">wa.me/905077403262</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'https://atayumurta.tr',
      width: 236,
      height: 236,
      colorDark: '#3A2208',
      colorLight: '#FDFAF4',
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>
</body>
</html>
