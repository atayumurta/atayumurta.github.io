<!DOCTYPE html>
<!--
  ATA YUMURTA — Kartvizit / Business Card
  ════════════════════════════════════════
  Standart boyut: 85mm × 55mm (Avrupa standardı)

  PDF OLARAK KAYDETME (matbaaya göndermek için):
  ──────────────────────────────────────────────
  1. Chrome'da aç
  2. Cmd+P (Print)
  3. Printer: "Save as PDF"
  4. Paper size: Custom → 85mm × 110mm  (her iki yüz üst üste)
  5. Margins: None — Scale: 100%
  6. Save → matbaaya gönder

  YÜKSEK ÇÖZÜNÜRLÜKLÜ PNG (alternatif):
  ──────────────────────────────────────
  1. Chrome DevTools aç (Cmd+Option+I)
  2. Device toolbar (Cmd+Shift+M)
  3. 1004 × 650 px, %100 ölçek
  4. "Capture screenshot" → her yüz için tekrarla
  (1004×650 = 85×55mm @ 300 DPI)
-->
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ata Yumurta — Kartvizit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --brown:       #8B5C1A;
      --brown-dark:  #5C3A0F;
      --brown-deep:  #3A2208;
      --brown-light: #C8894A;
      --brown-pale:  #D4A96A;
      --cream:       #F7F3EA;
      --cream-dark:  #EDE5D0;
      --warm-white:  #FDFAF4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── SCREEN PREVIEW ── */
    body {
      background: #d6c9b0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 60px 40px;
      font-family: 'Lora', serif;
    }

    .preview-label {
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(58,34,8,.5);
      text-align: center;
      margin-bottom: -16px;
    }

    .card {
      width: 85mm;
      height: 55mm;
      position: relative;
      overflow: hidden;
      border-radius: .6mm;
      box-shadow:
        0 2px 4px rgba(0,0,0,.08),
        0 12px 40px rgba(0,0,0,.22),
        0 0 0 .3mm rgba(0,0,0,.06);
    }

    /* ══════════════════════
       FRONT SIDE
    ══════════════════════ */
    .front {
      background: var(--cream);
      display: flex;
      flex-direction: column;
    }

    /* Background egg decorations */
    .front-egg-1 {
      position: absolute;
      width: 42mm; height: 52mm;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: var(--brown-light);
      opacity: .07;
      top: -14mm; right: -8mm;
      transform: rotate(18deg);
    }
    .front-egg-2 {
      position: absolute;
      width: 22mm; height: 28mm;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: var(--brown-dark);
      opacity: .05;
      bottom: -8mm; left: -4mm;
      transform: rotate(-12deg);
    }

    .front-body {
      display: flex;
      align-items: center;
      flex: 1;
      padding: 5.5mm 6mm 4mm 6mm;
      gap: 5mm;
      position: relative;
      z-index: 2;
    }

    /* Logo */
    .logo-wrap {
      width: 18mm; height: 18mm;
      flex-shrink: 0;
      border-radius: 50%;
      border: .55mm solid var(--brown-light);
      overflow: hidden;
      box-shadow:
        0 0 0 1.2mm rgba(200,137,74,.12),
        0 1.5mm 5mm rgba(92,58,15,.18);
    }
    .logo-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Divider */
    .front-divider {
      width: .25mm;
      align-self: stretch;
      background: var(--cream-dark);
      flex-shrink: 0;
      margin: 1mm 0;
    }

    /* Text */
    .front-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.8mm;
    }
    .front-eyebrow {
      font-size: 5.5pt;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--brown-light);
      font-family: 'Lora', serif;
    }
    .front-brand {
      font-family: 'Playfair Display', serif;
      line-height: 1.05;
    }
    .front-brand-line1 {
      display: block;
      font-size: 15pt;
      font-weight: 900;
      color: var(--brown-dark);
      letter-spacing: -.01em;
    }
    .front-brand-line2 {
      display: block;
      font-size: 17pt;
      font-weight: 900;
      font-style: italic;
      color: var(--brown-light);
      letter-spacing: -.02em;
    }
    .front-tagline-divider {
      width: 10mm; height: .2mm;
      background: var(--cream-dark);
    }
    .front-tagline {
      font-size: 6pt;
      font-style: italic;
      color: var(--brown);
      line-height: 1.55;
      font-family: 'Lora', serif;
    }

    /* Bottom strip */
    .front-footer {
      background: var(--brown-deep);
      padding: 2mm 6mm;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }
    .front-footer-brand {
      font-size: 5pt;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(212,169,106,.7);
      font-family: 'Lora', serif;
    }
    .front-footer-location {
      font-size: 5pt;
      color: rgba(212,169,106,.45);
      font-family: 'Lora', serif;
      font-style: italic;
    }

    /* ══════════════════════
       BACK SIDE
    ══════════════════════ */
    .back {
      background: var(--brown-deep);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5mm 6mm;
      gap: 4mm;
    }

    /* Background egg decos */
    .back-egg-1 {
      position: absolute;
      width: 50mm; height: 62mm;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: var(--brown-light);
      opacity: .06;
      top: -18mm; right: -12mm;
      transform: rotate(15deg);
    }
    .back-egg-2 {
      position: absolute;
      width: 28mm; height: 35mm;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: var(--brown-pale);
      opacity: .05;
      bottom: -10mm; left: -6mm;
      transform: rotate(-8deg);
    }

    /* Left: QR */
    .back-qr-wrap {
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8mm;
    }
    .qr-frame {
      background: var(--warm-white);
      padding: 2.2mm;
      border-radius: 1.2mm;
      line-height: 0;
      box-shadow: 0 2mm 8mm rgba(0,0,0,.3);
    }
    #qrcode canvas,
    #qrcode img {
      display: block;
      width: 20mm !important;
      height: 20mm !important;
    }
    .qr-label {
      font-size: 4.5pt;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(212,169,106,.5);
      font-family: 'Lora', serif;
    }

    /* Divider */
    .back-divider {
      width: .25mm;
      align-self: stretch;
      background: rgba(255,255,255,.08);
      flex-shrink: 0;
      margin: 1mm 0;
    }

    /* Right: Contact */
    .back-contact {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2mm;
      position: relative;
      z-index: 2;
    }
    .back-headline {
      font-family: 'Lora', serif;
      font-size: 6.5pt;
      font-style: italic;
      color: var(--brown-pale);
      line-height: 1.5;
    }
    .back-phone-row {
      display: flex;
      align-items: center;
      gap: 1.5mm;
    }
    .back-phone-icon {
      width: 3.5mm; height: 3.5mm;
      opacity: .6;
      flex-shrink: 0;
    }
    .back-phone {
      font-family: 'Playfair Display', serif;
      font-size: 14pt;
      font-weight: 900;
      color: var(--warm-white);
      letter-spacing: .02em;
      line-height: 1;
    }
    .back-links {
      display: flex;
      flex-direction: column;
      gap: .8mm;
    }
    .back-link-row {
      display: flex;
      align-items: center;
      gap: 1.5mm;
    }
    .back-link-icon {
      width: 3mm; height: 3mm;
      opacity: .5;
      flex-shrink: 0;
    }
    .back-link-text {
      font-family: 'Lora', serif;
      font-size: 6pt;
      color: rgba(212,169,106,.7);
      letter-spacing: .04em;
    }
    .back-link-text.wa {
      color: rgba(37,211,102,.7);
    }

    /* ── PRINT ── */
    @media print {
      body {
        background: white;
        padding: 0;
        gap: 0;
        display: block;
      }
      .preview-label { display: none; }
      .card {
        box-shadow: none;
        border-radius: 0;
        page-break-after: always;
        margin: 0;
      }
    }
  </style>
</head>
<body>

  <p class="preview-label">Ön Yüz — Front</p>

  <!-- ── FRONT ── -->
  <div class="card front">
    <div class="front-egg-1"></div>
    <div class="front-egg-2"></div>

    <div class="front-body">
      <div class="logo-wrap">
        <img src="../logo.jpg" alt="Ata Yumurta">
      </div>
      <div class="front-divider"></div>
      <div class="front-text">
        <span class="front-eyebrow">Burdur'dan Sofraya</span>
        <div class="front-brand">
          <span class="front-brand-line1">Burdur</span>
          <span class="front-brand-line2">Ata Yumurta</span>
        </div>
        <div class="front-tagline-divider"></div>
        <p class="front-tagline">Çiftlikten sofraya,<br>her gün taze yumurta</p>
      </div>
    </div>

    <div class="front-footer">
      <span class="front-footer-brand">Ata Yumurta Çiftliği</span>
      <span class="front-footer-location">Kışla Mah., Burdur</span>
    </div>
  </div>

  <p class="preview-label">Arka Yüz — Back</p>

  <!-- ── BACK ── -->
  <div class="card back">
    <div class="back-egg-1"></div>
    <div class="back-egg-2"></div>

    <div class="back-qr-wrap">
      <div class="qr-frame">
        <div id="qrcode"></div>
      </div>
      <span class="qr-label">atayumurta.tr</span>
    </div>

    <div class="back-divider"></div>

    <div class="back-contact">
      <p class="back-headline">Arayın, taze yumurtayı<br>kapınıza getirelim!</p>

      <div class="back-phone-row">
        <svg class="back-phone-icon" viewBox="0 0 24 24" fill="none" stroke="#D4A96A" stroke-width="2.5">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.12 12 19.79 19.79 0 0 1 1.05 3.4 2 2 0 0 1 3 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 16l.92.92z"/>
        </svg>
        <span class="back-phone">0507 740 3262</span>
      </div>

      <div class="back-links">
        <div class="back-link-row">
          <svg class="back-link-icon" viewBox="0 0 24 24" fill="none" stroke="#D4A96A" stroke-width="2.2">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span class="back-link-text">atayumurta.tr</span>
        </div>
        <div class="back-link-row">
          <svg class="back-link-icon" viewBox="0 0 24 24" fill="#25D366">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
          </svg>
          <span class="back-link-text wa">wa.me/905077403262</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'https://atayumurta.tr',
      width: 76,   /* 20mm @ 96dpi */
      height: 76,
      colorDark: '#3A2208',
      colorLight: '#FDFAF4',
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>

</body>
</html>
